# Jekyll configuration for personal blog
title: Daily Wisdom Reflections
email: your-email@example.com
description: >- # this means to ignore newlines until "baseurl:"
  A collection of daily wisdom reflections and thoughts
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://vfxowlsyvh.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: 
github_username: vfxowlsyvh

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
